<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <div class="min-h-screen bg-slate-50 flex">
  <aside class="w-64 bg-slate-900 text-white flex flex-col transition-all duration-300">
    <div class="p-6 text-2xl font-bold tracking-tight flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-500 rounded-lg"></div>
      <span>Nexus<span class="text-blue-400">UI</span></span>
    </div>
    
    <nav class="flex-1 px-4 space-y-2 mt-4">

        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span class="font-medium">Dashboard</span>
      </a>
      <a href="#" class="flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition-all">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        <span>Analytics</span>
      </a>
    </nav>

    <div class="p-4 border-t border-slate-800">
      <div class="flex items-center gap-3 p-2">
        <img src="https://ui-avatars.com/api/?name=Alex+Doe&background=3b82f6&color=fff" class="w-10 h-10 rounded-full shadow-lg" alt="User">
        <div>
          <p class="text-sm font-semibold">Alex Doe</p>
          <p class="text-xs text-slate-500">Pro Plan</p>
        </div>
      </div>
    </div>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto">
    <header class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold text-slate-800">Overview</h1>
        <p class="text-slate-500">Welcome back, here's what's happening today.</p>
      </div>
      <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-medium shadow-lg shadow-blue-200 transition-all active:scale-95">
        + New Project
      </button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
        <p class="text-slate-500 text-sm font-medium">Total Revenue</p>
        <h3 class="text-2xl font-bold text-slate-800 mt-1">$24,500</h3>
        <span class="text-green-500 text-xs font-bold bg-green-50 px-2 py-1 rounded-lg mt-2 inline-block">↑ 12.5%</span>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <p class="text-slate-500 text-sm font-medium">Active Users</p>
        <h3 class="text-2xl font-bold text-slate-800 mt-1">1,284</h3>
        <span class="text-blue-500 text-xs font-bold bg-blue-50 px-2 py-1 rounded-lg mt-2 inline-block">↑ 3.2%</span>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <p class="text-slate-500 text-sm font-medium">Conversion Rate</p>
        <h3 class="text-2xl font-bold text-slate-800 mt-1">4.8%</h3>
        <span class="text-slate-400 text-xs font-bold bg-slate-50 px-2 py-1 rounded-lg mt-2 inline-block">Stable</span>
      </div>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 h-64 flex items-end gap-2">
      <div class="flex-1 bg-blue-100 rounded-t-lg transition-all hover:bg-blue-500 h-1/2"></div>
      <div class="flex-1 bg-blue-100 rounded-t-lg transition-all hover:bg-blue-500 h-3/4"></div>
      <div class="flex-1 bg-blue-500 rounded-t-lg h-full"></div>
      <div class="flex-1 bg-blue-100 rounded-t-lg transition-all hover:bg-blue-500 h-2/3"></div>
      <div class="flex-1 bg-blue-100 rounded-t-lg transition-all hover:bg-blue-500 h-1/2"></div>
      <div class="flex-1 bg-blue-100 rounded-t-lg transition-all hover:bg-blue-500 h-4/5"></div>
    </div>
  </main>
</div>

</html>
